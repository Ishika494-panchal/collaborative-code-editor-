<div class="room-container">
  <div class="room-header">
    <div class="header-left">
      <button class="btn-back" (click)="goToDashboard()" title="Back to Dashboard" id="back-to-dashboard-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="brand-mini">
        <svg width="20" height="20" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="8" width="40" height="32" rx="4" stroke="#818cf8" stroke-width="2.5" fill="none"/>
          <text x="14" y="29" font-family="monospace" font-size="12" fill="#818cf8">&#60;/&#62;</text>
        </svg>
        <span class="brand-name">CodeSync</span>
      </div>
    </div>
    <div class="header-center">
      <span class="room-label">Room:</span>
      <code class="room-id-display">{{ roomId }}</code>
      <button class="btn-copy" (click)="copyRoomId()" [title]="copied ? 'Copied!' : 'Copy Room ID'" id="copy-room-id-btn">
        <svg *ngIf="!copied" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        <svg *ngIf="copied" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
      <button class="btn-share" (click)="copyRoomLink()" id="copy-room-link-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
        </svg>
        Share Link
      </button>
    </div>
    <div class="header-right">
      <span class="live-dot"></span>
      <span class="live-text">Live</span>
    </div>
  </div>
  <div class="main-content">
    <app-editor [roomId]="roomId" class="editor-area"></app-editor>
    <app-sidebar class="sidebar-area"></app-sidebar>
  </div>
</div>
