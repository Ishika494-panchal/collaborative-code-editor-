<div class="sidebar-container">
  <div class="sidebar-header">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
    </svg>
    <span>Participants</span>
    <span class="user-count">{{ activeUsers.length }}</span>
  </div>
  <ul class="user-list">
    <li *ngFor="let user of activeUsers" class="user-item">
      <div class="user-avatar-wrap">
        <div class="avatar-circle" [style.backgroundColor]="user.color">
          {{ user.name.charAt(0).toUpperCase() }}
        </div>
        <span class="online-dot"></span>
      </div>
      <div class="user-info">
        <span class="user-name">{{ user.name }}</span>
        <span class="you-badge" *ngIf="isCurrentUser(user)">You</span>
      </div>
    </li>
  </ul>
  <div class="empty-state" *ngIf="activeUsers.length === 0">
    <p>No participants yet</p>
    <p class="empty-hint">Share the room link to invite others</p>
  </div>
</div>
