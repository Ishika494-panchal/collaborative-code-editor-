services:
  # Redis Database
  - type: redis
    name: codesync-redis
    ipAllowList: [] # Allow internal access only
    plan: free

  # API Gateway
  - type: web
    name: codesync-api-gateway
    env: node
    buildCommand: "cd services/api-gateway && npm install"
    startCommand: "cd services/api-gateway && npm start"
    envVars:
      - key: PORT
        value: 3000
      - key: FRONTEND_URL
        value: https://codesync-frontend.onrender.com
      - key: EXECUTION_SERVICE_URL
        value: https://codesync-execution-service.onrender.com

  # Auth Service
  - type: web
    name: codesync-auth-service
    env: node
    buildCommand: "cd services/auth-service && npm install"
    startCommand: "cd services/auth-service && npm start"
    envVars:
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        value: https://codesync-frontend.onrender.com
      - key: REDIS_URL
        fromService:
          type: redis
          name: codesync-redis
          property: connectionString
      - key: MONGO_URI
        sync: false # Set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false # Set this manually in Render dashboard
      - key: GITHUB_CLIENT_SECRET
        sync: false # Set this manually in Render dashboard
      - key: GITHUB_CALLBACK_URL
        value: https://codesync-api-gateway.onrender.com/auth/github/callback
      - key: GATEWAY_URL
        value: https://codesync-api-gateway.onrender.com

  # Editor Service
  - type: web
    name: codesync-editor-service
    env: node
    buildCommand: "cd services/editor-service && npm install"
    startCommand: "cd services/editor-service && npm start"
    envVars:
      - key: PORT
        value: 3002
      - key: FRONTEND_URL
        value: https://codesync-frontend.onrender.com
      - key: REDIS_URL
        fromService:
          type: redis
          name: codesync-redis
          property: connectionString

  # Execution Service
  - type: web
    name: codesync-execution-service
    env: node
    buildCommand: "cd services/execution-service && npm install"
    startCommand: "cd services/execution-service && npm start"
    envVars:
      - key: PORT
        value: 3003

  # Frontend Static Site
  - type: web
    name: codesync-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist/frontend/browser"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        value: https://codesync-api-gateway.onrender.com
      - key: SOCKET_URL
        value: https://codesync-editor-service.onrender.com
