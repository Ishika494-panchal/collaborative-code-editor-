services:
  # API Gateway
  - type: web
    name: codesync-api-gateway
    env: node
    buildCommand: "cd services/api-gateway && npm install"
    startCommand: "cd services/api-gateway && npm start"
    envVars:
      - key: PORT
        value: 3000
      - key: FRONTEND_URL
        sync: false # Set manually to your Vercel URL
      - key: EXECUTION_SERVICE_URL
        value: https://codesync-execution-service.onrender.com

  # Auth Service
  - type: web
    name: codesync-auth-service
    env: node
    buildCommand: "cd services/auth-service && npm install"
    startCommand: "cd services/auth-service && npm start"
    envVars:
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        sync: false # Set manually to your Vercel URL
      - key: REDIS_URL
        sync: false # Set manually to your Upstash Redis URL
      - key: MONGO_URI
        sync: false # Set manually to your MongoDB Atlas URI
      - key: JWT_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false # Set manually
      - key: GITHUB_CLIENT_SECRET
        sync: false # Set manually
      - key: GITHUB_CALLBACK_URL
        value: https://codesync-auth-service.onrender.com/auth/github/callback

  # Editor Service
  - type: web
    name: codesync-editor-service
    env: node
    buildCommand: "cd services/editor-service && npm install"
    startCommand: "cd services/editor-service && npm start"
    envVars:
      - key: PORT
        value: 3002
      - key: FRONTEND_URL
        sync: false # Set manually to your Vercel URL
      - key: REDIS_URL
        sync: false # Set manually to your Upstash Redis URL

  # Execution Service
  - type: web
    name: codesync-execution-service
    env: node
    buildCommand: "cd services/execution-service && npm install"
    startCommand: "cd services/execution-service && npm start"
    envVars:
      - key: PORT
        value: 3003
